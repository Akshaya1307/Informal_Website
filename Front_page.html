<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ Gameverse Arcade | Interactive Game Showcase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a001a, #0b0022);
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #f3eaff;
            padding: 2rem 1.5rem;
        }

        /* MAIN LAYOUT: POSTER LEFT + GAMES RIGHT */
        .dashboard {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: flex-start;
        }

        /* LEFT SIDE — POSTER with glassmorphism */
        .poster-area {
            flex: 1.2;
            min-width: 240px;
            background: rgba(25, 0, 55, 0.55);
            backdrop-filter: blur(4px);
            border-radius: 2.5rem;
            padding: 1.2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(210, 0, 255, 0.2);
            transition: transform 0.2s ease;
        }

        .poster-area:hover {
            transform: translateY(-5px);
        }

        .poster-card {
            border-radius: 2rem;
            overflow: hidden;
            background: #00000020;
            text-align: center;
        }

        .poster-card img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 1.5rem;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }

        .poster-caption {
            margin-top: 1rem;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 400;
            color: #d9b8ff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .poster-caption span {
            background: #ff66cc30;
            padding: 4px 12px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        /* RIGHT SIDE — GAMES GRID AREA */
        .games-area {
            flex: 2.8;
            min-width: 260px;
        }

        .section-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff44dd, #b622ff);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px #ff44aa40;
            backdrop-filter: blur(2px);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.4rem;
        }

        /* MODERN GLASS GAME CARD */
        .game-card {
            background: linear-gradient(125deg, rgba(45, 10, 80, 0.85), rgba(25, 0, 55, 0.9));
            backdrop-filter: blur(5px);
            border-radius: 1.8rem;
            padding: 0;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(210, 130, 255, 0.35);
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .game-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: #ff88f0;
            box-shadow: 0 18px 28px -10px #c000ff70, 0 0 0 2px rgba(255, 100, 230, 0.3);
        }

        .game-inner {
            padding: 1.2rem 1.2rem 0.8rem 1.2rem;
        }

        .game-title {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD966, #FF99FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .game-title::before {
            content: "🎲";
            font-size: 1.3rem;
            background: none;
            -webkit-background-clip: unset;
            color: #f3aaff;
        }

        /* ========= SCROLLABLE DESCRIPTION AREA ========= */
        .game-desc-wrapper {
            max-height: 0;
            opacity: 0;
            overflow-y: auto;    /* enables vertical scroll when needed */
            overflow-x: hidden;
            transition: max-height 0.45s ease-in-out, opacity 0.3s ease, margin 0.2s;
            margin-top: 0;
            border-top: 1px solid transparent;
            scrollbar-width: thin;
            scrollbar-color: #ff88dd #3a0060;
        }

        /* custom scrollbar for webkit */
        .game-desc-wrapper::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        .game-desc-wrapper::-webkit-scrollbar-track {
            background: #2e004b;
            border-radius: 10px;
        }
        .game-desc-wrapper::-webkit-scrollbar-thumb {
            background: #ff88dd;
            border-radius: 10px;
        }

        .game-card.active .game-desc-wrapper {
            max-height: 160px;    /* fixed height with scroll if text overflows */
            opacity: 1;
            margin-top: 0.9rem;
            border-top: 1px solid rgba(255, 200, 255, 0.3);
            padding-right: 4px;   /* space for scrollbar */
        }

        .game-description {
            padding: 0.6rem 0.2rem 0.6rem 0.2rem;
            font-size: 0.9rem;
            line-height: 1.45;
            color: #f0e2ff;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .game-description::before {
            content: "✨";
            font-size: 1rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* expand hint styling */
        .expand-hint {
            text-align: right;
            font-size: 0.7rem;
            color: #b47cff;
            margin-top: 0.4rem;
            margin-bottom: 0.2rem;
            transition: 0.2s;
            font-weight: 500;
        }

        .game-card.active .expand-hint {
            color: #ffbbee;
        }

        /* large screen layout: description on RIGHT SIDE of title when active */
        @media (min-width: 860px) {
            .game-card.active .game-inner {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                justify-content: space-between;
            }
            .game-card.active .game-title {
                flex: 1.2;
                margin-bottom: 0;
                min-width: 130px;
            }
            .game-card.active .game-desc-wrapper {
                flex: 2;
                max-height: 140px;
                opacity: 1;
                margin-top: 0;
                border-top: none;
                border-left: 2px solid #ff99ff70;
                padding-left: 1rem;
                margin-left: 0.5rem;
                overflow-y: auto;   /* scroll still works in side layout */
            }
            .game-card.active .expand-hint {
                flex-basis: 100%;
                text-align: right;
                margin-top: 0.5rem;
                border-top: none;
            }
            .game-card.active .game-description::before {
                content: "📌 ";
            }
        }

        /* responsive stacking for mobile */
        @media (max-width: 859px) {
            .game-card.active .game-desc-wrapper {
                max-height: 170px;
            }
        }

        @media (max-width: 550px) {
            .games-grid {
                grid-template-columns: 1fr;
            }
            .game-card.active .game-desc-wrapper {
                max-height: 190px;
            }
        }

        /* footer glow */
        .glow-footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            opacity: 0.7;
            font-family: monospace;
            letter-spacing: 1px;
        }

        /* global scroll smoothness */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e0030;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c459ff;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- LEFT: POSTER IMAGE with minimal decoration -->
    <div class="poster-area">
        <div class="poster-card">
            <img src="Poster.jpeg" alt="Event Poster - Game Fest 2025">
            <div class="poster-caption">
                <span>🎮 FUN GAMES</span>
                <span>🎮 21 GAMES</span>
            </div>
        </div>
    </div>

    <!-- RIGHT: GAMES GRID (each card: title + scrollable description) -->
    <div class="games-area">
        <div class="section-badge">
            🎯 Tap any game — watch the magic unfold ✨
        </div>
        <div class="games-grid" id="gamesGrid"></div>
    </div>
</div>
<div class="glow-footer">
    ✨ Tap a game card → the challenge appears right beside the title with a smooth scroll ✨<br>
    Click again to fold it back • every game holds a surprise!
</div>

<script>
    // ------------------------------------------------------------------
    // FULL GAME LIST (21 games - original list WITHOUT the bonus "Ultimate Gauntlet Run")
    // Descriptions remain exactly as they were — no changes to length or width.
    // ------------------------------------------------------------------
    const fullGames = [
        { title: "Say the Color, Not the Word", description: "Say the color of the text instead of the word itself. Quick thinking and laser focus required! Multiple rounds, fastest brain wins. A true test of cognitive agility — don't get fooled by the word meaning." },
        { title: "Musical Chairs", description: "Walk around chairs when music plays. Race to sit as soon as it stops. Last one standing wins the rhythm battle. Classic elimination fun that never gets old. Stay alert!" },
        { title: "Pick Color Paper with Straw", description: "Pick paper using straw only — no hands, only lung power! Control your breath to lift colored papers. Steady breathing and precision decide the winner. Ultra competitive." },
        { title: "Three Box Relay", description: "Complete three unique tasks hidden inside boxes, then pass the baton to your teammate. Coordination, speed and mystery make this relay legendary." },
        { title: "Tower Toss Challenge", description: "Hit stacked targets using limited throws. Points for each fallen tower. Highest score takes the trophy. Accuracy and angle mastery needed — wind up and throw!" },
        { title: "Human Tic-Tac-Toe", description: "You become the living X or O. Move into giant grid positions to form a line before opponents. Strategy meets physical fun — communicate with your team." },
        { title: "Hand & Foot Puzzle", description: "Balance using only hands and feet on marked spots. Don't touch the ground with any other body part! Tests flexibility and core strength. Last one stable wins." },
        { title: "Color Hunt", description: "Find objects of given color in limited time. Eagle eyes needed — scavenger hunt style. Fastest collection wins points. Brightness and creativity count!" },
        { title: "Place Coin on Lemon", description: "Balance a coin carefully on a lemon — steady hands champion! No adhesive allowed. The person who stacks maximum coins or holds longest wins nerves of steel." },
        { title: "Picking Balls with Spoon", description: "Transfer balls using a spoon held in mouth. No hands! Fastest and most stable wins. One drop and you restart — hilarious and tricky." },
        { title: "Swift Pass Challenge", description: "Pass objects quickly in a chain — fastest relay wins. Team coordination is everything. Drop the object? Start over. Smooth and swift = victory." },
        { title: "Toss Cup from Head", description: "Balance a cup on your head, then toss and catch it without using hands. Gravity-defying fun! Master the flick motion. Most catches crowned champion." },
        { title: "Ball Maze", description: "Guide a small ball through a twisting maze using only tilts. Patience wins. Avoid holes and dead ends. Fastest clear time gets the crown. Nerve-wracking!" },
        { title: "Boundary Boss", description: "Stay strictly inside a drawn boundary while completing dynamic actions. Step out = elimination. Last survivor wins. Agility and spatial awareness are key." },
        { title: "Dare Box", description: "Pull a random dare from the mystery box and perform it with full energy. Laughter guaranteed. From silly dances to heroic feats — no backing out!" },
        { title: "Blue Yellow Dhamaka", description: "React instantly to color commands: 'blue' means touch yellow, 'yellow' means touch blue! Chaotic fun for everyone. Wrong move = elimination. Fast brain required!" },
        { title: "Spin & Land", description: "Spin around 10 times, then land exactly on a target. Dizzy precision! The closest to bullseye wins. Balance after spinning — ultimate challenge." },
        { title: "Defend Our Castle", description: "Team up to protect your object from rivals. Strategy & speed required. Use shields and teamwork. Last castle standing earns glory." },
        { title: "Check Your Patience", description: "Perform a delicate task extremely slowly. Whoever rushes loses. It's a meditation in motion — slowest, steadiest hand takes victory." },
        { title: "Reflex Exit", description: "React faster than light — catch falling objects before they hit ground. Multiple drops, lightning reflexes. Best catcher wins. Stay alert!" },
        { title: "Puzzle with Paper", description: "Solve paper puzzle by folding & cutting. Mind-bending logic challenge. Finish the shape or pattern correctly. Creativity meets intelligence." }
    ];

    // Helper: escape HTML safely
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // Render all game cards into grid
    const gridContainer = document.getElementById('gamesGrid');
    
    function buildGameCards() {
        gridContainer.innerHTML = '';
        fullGames.forEach((game, idx) => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.setAttribute('data-id', idx);
            
            // inner HTML: title + scrollable description wrapper
            card.innerHTML = `
                <div class="game-inner">
                    <div class="game-title">${escapeHtml(game.title)}</div>
                    <div class="game-desc-wrapper">
                        <div class="game-description">${escapeHtml(game.description)}</div>
                    </div>
                    <div class="expand-hint">▼ tap to expand</div>
                </div>
            `;
            
            // click toggles active class -> expands description with scroll support
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                card.classList.toggle('active');
                
                // Update hint text based on state
                const hintSpan = card.querySelector('.expand-hint');
                if (card.classList.contains('active')) {
                    hintSpan.innerHTML = '▲ tap to collapse • scroll ↓';
                    hintSpan.style.color = '#ffd0fa';
                    // Optional: force scroll to top of description when expanded (nice UX)
                    const descWrapper = card.querySelector('.game-desc-wrapper');
                    if (descWrapper) {
                        descWrapper.scrollTop = 0;
                    }
                } else {
                    hintSpan.innerHTML = '▼ tap to expand';
                    hintSpan.style.color = '#b47cff';
                }
            });
            
            gridContainer.appendChild(card);
        });
    }
    
    buildGameCards();
    
    // Additional style to ensure description scrolling is smooth and visible
    const scrollStyle = document.createElement('style');
    scrollStyle.textContent = `
        /* enforce scroll behavior and max-height with overflow */
        .game-desc-wrapper {
            overflow-y: auto !important;
            scroll-behavior: smooth;
        }
        /* nice subtle gradient at scroll boundary */
        .game-card.active .game-desc-wrapper {
            scrollbar-width: thin;
        }
        /* better padding for description text */
        .game-description {
            word-break: break-word;
            white-space: normal;
        }
        /* on very small screens ensure enough height to scroll */
        @media (max-width: 550px) {
            .game-card.active .game-desc-wrapper {
                max-height: 180px;
            }
        }
        /* for larger screens, ensure description block scrolls independently */
        @media (min-width: 860px) {
            .game-card.active .game-desc-wrapper {
                max-height: 150px;
                overflow-y: auto;
            }
        }
    `;
    document.head.appendChild(scrollStyle);
    
    // improve side-by-side readability and scroll experience
    const additionalFix = document.createElement('style');
    additionalFix.textContent = `
        @media (min-width: 860px) {
            .game-card.active .game-inner {
                gap: 0.8rem;
            }
            .game-card.active .game-description {
                padding-top: 0;
                padding-bottom: 0;
            }
            .game-desc-wrapper::-webkit-scrollbar {
                width: 4px;
            }
        }
        .game-card.active .game-desc-wrapper {
            overscroll-behavior: contain;
        }
    `;
    document.head.appendChild(additionalFix);
    
    // small console greeting
    console.log("🎉 21 epic games loaded — tap any card, the challenge appears smoothly with scroll if needed!");
</script>
</body>
</html>
